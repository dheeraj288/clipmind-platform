<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ClipMind - Collection</title>

  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body>

  <main class="dashboard">

    <aside class="sidebar">

      <div>

        <div class="brand">
          🧠 ClipMind
        </div>

        <nav class="menu">

          <a href="dashboard.html" class="menu-item">
            Dashboard
          </a>

          <a href="clips.html" class="menu-item">
            All Clips
          </a>

          <a href="collections.html" class="menu-item active">
            Collections
          </a>

          <a href="favorites.html" class="menu-item">
            Favorites
          </a>

          <a href="trending.html" class="menu-item">
            Trending
          </a>

          <a href="ai-memory.html" class="menu-item">
            AI Memory
          </a>

        </nav>

      </div>

      <button
        id="logout-btn"
        class="logout-btn"
      >
        Logout
      </button>

    </aside>

    <section class="content">

      <header class="hero-section">

        <div>

          <p class="hero-label">
            Collection Workspace
          </p>

          <h1 id="collection-title">
            Loading...
          </h1>

          <p class="hero-subtitle">
            Organized clips inside this collection.
          </p>

        </div>

      </header>

      <section class="dashboard-section">

        <div class="section-title">
          📚 Collection Clips
        </div>

        <div id="collection-clips-list"></div>

      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ruby.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>

  <script
    type="module"
    src="assets/js/collection.js"
  ></script>

  <div id="toast" class="web-toast">
    Done ✔
  </div>

</body>
</html>
