<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipMind Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">

      <h1>ClipMind</h1>
      <p>Login to your smart clipboard dashboard</p>

      <form id="login-form">
        <input
          id="email"
          type="email"
          placeholder="Email"
          required
        />

        <input
          id="password"
          type="password"
          placeholder="Password"
          required
        />

        <button type="submit">
          Login
        </button>
      </form>

      <div id="message"></div>

    </section>
  </main>

  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
