<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ClipMind - Collections</title>

  <link
    rel="stylesheet"
    href="assets/css/style.css"
  />

</head>

<body>

  <main class="dashboard">

    <aside class="sidebar">

      <div>

        <div class="brand">
          🧠 ClipMind
        </div>

        <nav class="menu">

          <a href="dashboard.html" class="menu-item">
            Dashboard
          </a>

          <a href="clips.html" class="menu-item">
            All Clips
          </a>

          <a href="collections.html" class="menu-item active">
            Collections
          </a>

          <a href="favorites.html" class="menu-item">
            Favorites
          </a>

          <a href="trending.html" class="menu-item">
            Trending
          </a>

          <a href="ai-memory.html" class="menu-item">
            AI Memory
          </a>

        </nav>

      </div>

      <button
        id="logout-btn"
        class="logout-btn"
      >
        Logout
      </button>

    </aside>

    <section class="content">

      <header class="hero-section">

        <div>

          <p class="hero-label">
            Smart Organization
          </p>

          <h1>
            Organize clips into
            <span>collections.</span>
          </h1>

          <p class="hero-subtitle">
            Group related clips together for faster access and AI memory organization.
          </p>

        </div>

      </header>

      <section class="dashboard-section">

        <div class="section-title">
          📚 Collections
        </div>

        <div class="collection-create">

          <input
            id="collection-name"
            type="text"
            placeholder="New collection name..."
          />

          <button id="create-collection-btn">
            Create
          </button>

        </div>

        <div class="web-search-box">

          <input
            id="collection-search"
            type="text"
            placeholder="Search collections..."
            autocomplete="off"
          />

        </div>

        <div id="collections-list"></div>

      </section>

    </section>

  </main>

  <script
    type="module"
    src="assets/js/collections.js"
  ></script>

  <div id="toast" class="web-toast">
    Done ✔
  </div>

</body>
</html>
